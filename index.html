<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat & Call App</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .hidden { display: none; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { padding: 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        
        /* Layout Chat */
        #chat-box { height: 200px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; padding: 5px 10px; border-radius: 5px; width: fit-content; }
        .msg-me { background: var(--primary); margin-left: auto; }
        .msg-them { background: #334155; }
        
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        video { width: 100%; border-radius: 10px; background: #000; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="auth-view" class="card">
        <h2>Login / Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth('login')" style="background: var(--primary); color: white;">Login</button>
        <button onclick="handleAuth('register')" style="background: transparent; color: white; border: 1px solid white;">Register</button>
    </div>

    <div id="main-view" class="hidden">
        <div class="card">
            <h3 id="welcome">Halo</h3>
            <div id="video-grid"><video id="localVideo" autoplay muted playsinline></video></div>
        </div>

        <div class="card">
            <h4>Global Group Chat</h4>
            <div id="chat-box"></div>
            <div style="display: flex;">
                <input type="text" id="chat-input" placeholder="Ketik pesan grup...">
                <button onclick="sendChat('GROUP')" style="background: var(--success); color: white; margin-left: 5px;">Kirim</button>
            </div>
        </div>

        <div class="card">
            <h4>Teman Online</h4>
            <div id="user-list"></div>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyl77WYiPCqW0-Ngx36attf3PmxwpXIlri4qteaQG1vCzdo8Ux7ZouIpqiICWpaUgYt/exec";
    let myPeer, localStream, currentUser, currentTarget = "GROUP";

    // AUTO LOGIN
    window.onload = () => {
        const u = localStorage.getItem('v_user'), p = localStorage.getItem('v_pass');
        if(u && p) { document.getElementById('username').value = u; document.getElementById('password').value = p; handleAuth('login'); }
    };

    async function handleAuth(type) {
        const user = document.getElementById('username').value, pass = document.getElementById('password').value;
        myPeer = new Peer();
        const pId = await new Promise(r => myPeer.on('open', r));

        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: type, username: user, password: pass, peerId: pId })
        });
        const result = await res.text();
        if (result.includes("ok")) {
            localStorage.setItem('v_user', user); localStorage.setItem('v_pass', pass);
            currentUser = user; startApp();
        } else if (type === "register") alert("Berhasil Register!");
    }

    async function startApp() {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        document.getElementById('welcome').innerText = "Halo, " + currentUser;

        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;

        myPeer.on('call', call => { call.answer(localStream); setupStream(call); });

        setInterval(refreshUsers, 5000);
        setInterval(fetchChats, 3000); // Ambil chat tiap 3 detik
    }

    async function sendChat(target) {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "send_chat", from: currentUser, to: target, msg: input.value })
        });
        input.value = ""; fetchChats();
    }

    async function fetchChats() {
        const res = await fetch(`${SCRIPT_URL}?action=get_chat&me=${currentUser}&target=${currentTarget}`);
        const chats = await res.json();
        const box = document.getElementById('chat-box');
        box.innerHTML = chats.map(c => `<div class="msg ${c[1]==currentUser?'msg-me':'msg-them'}"><b>${c[1]}:</b> ${c[3]}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function refreshUsers() {
        const res = await fetch(SCRIPT_URL);
        const users = await res.json();
        const list = document.getElementById('user-list');
        list.innerHTML = users.filter(u => u.username !== currentUser).map(u => `
            <div class="user-item">
                <span>${u.username}</span>
                <div>
                    <button onclick="startCall('${u.peerId}', 'vc')" style="background:var(--success); color:white;">VC</button>
                    <button onclick="openPrivateChat('${u.username}')" style="background:var(--primary); color:white;">Chat</button>
                </div>
            </div>
        `).join('');
    }

    function openPrivateChat(name) {
        currentTarget = name;
        alert("Sekarang chatting dengan: " + name);
        fetchChats();
    }

    function startCall(id, type) {
        const call = myPeer.call(id, localStream, { metadata: { type } });
        setupStream(call);
    }

    function setupStream(call) {
        call.on('stream', s => {
            if (document.getElementById(call.peer)) return;
            const v = document.createElement('video'); v.id = call.peer; v.srcObject = s; v.autoplay = true; v.playsinline = true;
            document.getElementById('video-grid').appendChild(v);
        });
    }
</script>
</body>
</html>
