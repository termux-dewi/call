<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Video Call (Sheets DB)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; margin-top: 50px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .hidden { display: none; }
        
        /* Dashboard & Video */
        #main-view { width: 95%; max-width: 1000px; margin-top: 20px; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; }
        video { width: 100%; border-radius: 12px; background: #000; transform: scaleX(-1); aspect-ratio: 4/3; object-fit: cover; }
        .user-list { margin-top: 30px; background: var(--card); border-radius: 12px; padding: 15px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #334155; }
        .btn-small { width: auto; padding: 6px 12px; margin: 0 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="auth-view" class="container">
        <div class="card">
            <h2 id="auth-title">Masuk Ke Call</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="handleAuth('login')">Login</button>
            <button class="btn-outline" onclick="handleAuth('register')">Buat Akun Baru</button>
            <p id="auth-msg" style="font-size: 12px; color: #94a3b8; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="main-view" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 id="welcome-text">Halo, User</h3>
            <button onclick="location.reload()" class="btn-small" style="background: var(--danger); color: white;">Logout</button>
        </div>

        <div id="video-grid">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="user-list">
            <h4>Teman Online (Maks 9)</h4>
            <div id="online-users-container">Mencari teman...</div>
        </div>
    </div>

<script>
    // --- KONFIGURASI (WAJIB ISI) ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9AYLOCnO5-jxYX5qUfI545j9l7ef5h6Ee6MYUwUCMsU_gN-kyktSK5zkAcHwXAmQa/exec";
    
    let myPeer, localStream, myPeerId, currentUser;

    // 1. FUNGSI AUTH (LOGIN & REGISTER)
    async function handleAuth(type) {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const msg = document.getElementById('auth-msg');

        if (!user || !pass) return alert("Isi username & password!");
        msg.innerText = "Memproses ke Google Sheets...";

        // Untuk Login, kita perlu PeerID agar bisa ditemukan orang lain
        let tempPeerId = "";
        if (type === "login") {
            myPeer = new Peer();
            tempPeerId = await new Promise(resolve => myPeer.on('open', resolve));
            myPeerId = tempPeerId;
        }

        try {
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: type, username: user, password: pass, peerId: tempPeerId })
            });
            const result = await res.text();

            if (result.includes("Success")) {
                alert("Berhasil Daftar! Silakan klik Login.");
                msg.innerText = "";
            } else if (result.includes("ok")) {
                currentUser = user;
                showDashboard();
            } else {
                alert("Gagal: " + result);
                msg.innerText = "";
            }
        } catch (e) {
            alert("Error Koneksi: Pastikan URL Script benar & Deploy Anyone.");
        }
    }

    // 2. TAMPILAN DASHBOARD
    async function showDashboard() {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        document.getElementById('welcome-text').innerText = "Halo, " + currentUser;

        // Ambil Kamera
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;

        // Handle Panggilan Masuk
        myPeer.on('call', call => {
            call.answer(localStream);
            setupRemoteStream(call);
        });

        // Cek User Online setiap 5 detik
        refreshOnlineUsers();
        setInterval(refreshOnlineUsers, 5000);
    }

    // 3. REFRESH LIST USER ONLINE
    async function refreshOnlineUsers() {
        try {
            const res = await fetch(SCRIPT_URL);
            const users = await res.json();
            const container = document.getElementById('online-users-container');
            container.innerHTML = "";

            users.forEach(u => {
                if (u.username === currentUser) return;
                const div = document.createElement('div');
                div.className = "user-item";
                div.innerHTML = `
                    <span>${u.username}</span>
                    <div>
                        <button class="btn-small btn-primary" onclick="startCall('${u.peerId}', 'call')">Voice</button>
                        <button class="btn-small btn-primary" style="background:var(--success)" onclick="startCall('${u.peerId}', 'vc')">Video</button>
                    </div>
                `;
                container.appendChild(div);
            });
            if (users.length <= 1) container.innerText = "Tidak ada teman online.";
        } catch (e) { console.log("Gagal update list"); }
    }

    // 4. LOGIKA MEMANGGIL (CALL)
    function startCall(targetPeerId, type) {
        // Matikan track video jika hanya Voice Call
        localStream.getVideoTracks()[0].enabled = (type === 'vc');
        
        const call = myPeer.call(targetPeerId, localStream, { metadata: { type } });
        setupRemoteStream(call);
    }

    function setupRemoteStream(call) {
        call.on('stream', remoteStream => {
            if (document.getElementById(call.peer)) return;
            const video = document.createElement('video');
            video.id = call.peer;
            video.srcObject = remoteStream;
            video.autoplay = true;
            video.playsinline = true;
            
            // Sembunyikan video jika metadata adalah 'call' (Voice Only)
            if (call.metadata && call.metadata.type === 'call') video.style.display = "none";
            
            document.getElementById('video-grid').appendChild(video);
        });
    }
</script>
</body>
                </html>
