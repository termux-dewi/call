<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golongan Pro - Secure</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b141a; --header: #202c33; --accent: #00a884; --me: #005c4b; --them: #262d31; --text: #e9edef; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* AUTH STYLE */
        #auth-view { display: flex; align-items: center; justify-content: center; height: 100%; padding: 20px; }
        .auth-card { background: var(--header); padding: 30px; border-radius: 10px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; background: #2a3942; color: white; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: transparent; color: var(--accent); border: 1px solid var(--accent); }

        /* APP STYLE */
        .sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #111b21; transition: 0.3s; z-index: 100; border-right: 1px solid #2a3942; }
        .sidebar.active { left: 0; }
        header { background: var(--header); padding: 15px; display: flex; align-items: center; gap: 15px; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 8px; font-size: 14px; position: relative; }
        .me { background: var(--me); align-self: flex-end; border-bottom-right-radius: 0; }
        .them { background: var(--them); align-self: flex-start; border-bottom-left-radius: 0; }
        #video-grid { display: flex; flex-wrap: wrap; gap: 5px; background: #000; padding: 5px; }
        video { width: 48%; border-radius: 5px; background: #222; aspect-ratio: 4/3; object-fit: cover; }
        .user-row { padding: 15px; border-bottom: 1px solid #2a3942; display: flex; justify-content: space-between; align-items: center; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 90; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="auth-view">
        <div class="auth-card">
            <h2 id="auth-title" style="color: var(--accent); margin-bottom: 20px;">LOGIN</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            
            <div id="login-btns">
                <button class="btn btn-main" onclick="handleAuth('login')">MASUK</button>
                <button class="btn btn-sub" onclick="toggleAuth(true)">Belum punya akun? Daftar</button>
            </div>
            
            <div id="register-btns" class="hidden">
                <button class="btn btn-main" onclick="handleAuth('register')">DAFTAR SEKARANG</button>
                <button class="btn btn-sub" onclick="toggleAuth(false)">Sudah punya akun? Login</button>
            </div>
            <p id="auth-msg" style="font-size: 12px; margin-top: 15px; color: #ff4b4b;"></p>
        </div>
    </div>

    <div id="main-view" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
        <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
        
        <div class="sidebar" id="sidebar">
            <div style="padding: 20px; background: var(--header); font-weight: bold; border-bottom: 1px solid #2a3942;" id="my-name">User</div>
            <div class="menu-item" onclick="showSection('chat_grup')">💬 Chat Grup</div>
            <div class="menu-item" onclick="showSection('pilih_user_chat')">👤 Private Chat</div>
            <div class="menu-item" onclick="showSection('pilih_user_call')">📞 Audio Call</div>
            <div class="menu-item" onclick="showSection('pilih_user_vc')">📹 Video Call</div>
            <div class="menu-item" onclick="logout()" style="color:#ff4b4b; margin-top:20px;">🚪 Keluar</div>
        </div>

        <header>
            <div onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">☰</div>
            <div id="section-title">Chat Grup</div>
        </header>

        <div id="video-grid" class="hidden">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div id="chat-section" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
            <div id="chat-box"></div>
            <div style="padding:10px; background:var(--header); display:flex; gap:10px;">
                <input type="text" id="chat-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:5px; cursor:pointer;">➤</button>
            </div>
        </div>

        <div id="list-section" class="hidden" style="flex:1; overflow-y:auto;">
            <div id="online-list"></div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA335JEP-5VPS60PcttrNh_D0DJ7XiLu2A",
        authDomain: "golongan.firebaseapp.com",
        databaseURL: "https://golongan-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "golongan",
        storageBucket: "golongan.firebasestorage.app",
        messagingSenderId: "927321543281",
        appId: "1:927321543281:web:99a74c3e826dbe882641d0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, myPeer, localStream, currentMode, currentTarget = "global", chatRef;

    function toggleAuth(isReg) {
        document.getElementById('auth-title').innerText = isReg ? "REGISTER" : "LOGIN";
        document.getElementById('login-btns').classList.toggle('hidden', isReg);
        document.getElementById('register-btns').classList.toggle('hidden', !isReg);
        document.getElementById('auth-msg').innerText = "";
    }

    async function handleAuth(type) {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();
        const msg = document.getElementById('auth-msg');

        if(!user || !pass) return alert("Username & Password wajib diisi!");

        if(type === 'register') {
            const check = await db.ref('accounts/' + user).once('value');
            if(check.exists()) return msg.innerText = "Username sudah terdaftar!";
            
            await db.ref('accounts/' + user).set({ password: pass });
            alert("Registrasi Berhasil! Silakan Login.");
            toggleAuth(false);
        } else {
            const check = await db.ref('accounts/' + user).once('value');
            if(!check.exists() || check.val().password !== pass) return msg.innerText = "Username/Password salah!";
            
            currentUser = user;
            localStorage.setItem('golongan_user', user);
            localStorage.setItem('golongan_pass', pass); // Simpan pass untuk auto-login
            
            myPeer = new Peer();
            myPeer.on('open', id => {
                db.ref('users/' + currentUser).set({ peerId: id, status: 'online' });
                db.ref('users/' + currentUser).onDisconnect().remove();
                startApp();
            });
        }
    }

    function startApp() {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        document.getElementById('my-name').innerText = "User: " + currentUser;
        
        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
            localStream = s; document.getElementById('localVideo').srcObject = s;
        }).catch(e => console.log("Izin media ditolak"));

        myPeer.on('call', call => {
            call.answer(localStream);
            document.getElementById('video-grid').classList.remove('hidden');
            call.on('stream', s => addRemoteVideo(s, call.peer));
        });

        showSection('chat_grup');
    }

    // Fungsi Navigasi, List User, dan Chat sama dengan versi sebelumnya
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showSection(mode) {
        currentMode = mode;
        toggleMenu();
        document.getElementById('chat-section').classList.add('hidden');
        document.getElementById('list-section').classList.add('hidden');

        if(mode === 'chat_grup') {
            document.getElementById('section-title').innerText = "Global Chat";
            document.getElementById('chat-section').classList.remove('hidden');
            listenToChat("global");
        } else {
            const titles = {pilih_user_chat: "Private Chat", pilih_user_call: "Audio Call", pilih_user_vc: "Video Call"};
            document.getElementById('section-title').innerText = titles[mode];
            document.getElementById('list-section').classList.remove('hidden');
            refreshUsers();
        }
    }

    function refreshUsers() {
        db.ref('users').once('value', snap => {
            const users = snap.val();
            const list = document.getElementById('online-list');
            list.innerHTML = "";
            for(let name in users) {
                if(name === currentUser) continue;
                list.innerHTML += `<div class="user-row"><span>● ${name}</span><button onclick="executeAction('${name}', '${users[name].peerId}')" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:5px;">Pilih</button></div>`;
            }
        });
    }

    function executeAction(name, peerId) {
        if(currentMode === 'pilih_user_chat') {
            document.getElementById('section-title').innerText = "Chat: " + name;
            document.getElementById('list-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            const roomId = [currentUser, name].sort().join("_");
            listenToChat(roomId);
        } else {
            document.getElementById('video-grid').classList.remove('hidden');
            localStream.getVideoTracks()[0].enabled = (currentMode === 'pilih_user_vc');
            const call = myPeer.call(peerId, localStream);
            call.on('stream', s => addRemoteVideo(s, peerId));
        }
    }

    function listenToChat(roomId) {
        currentTarget = roomId;
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        if(chatRef) chatRef.off();
        chatRef = db.ref('messages/' + roomId);
        chatRef.limitToLast(50).on('child_added', snap => {
            const m = snap.val();
            const isMe = m.sender === currentUser;
            box.innerHTML += `<div class="bubble ${isMe?'me':'them'}"><small style="font-size:10px; opacity:0.6">${m.sender}</small><br>${m.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const inp = document.getElementById('chat-input');
        if(!inp.value.trim()) return;
        db.ref('messages/' + currentTarget).push({ sender: currentUser, text: inp.value, time: Date.now() });
        inp.value = "";
    }

    function addRemoteVideo(stream, id) {
        if(document.getElementById(id)) return;
        const v = document.createElement('video'); v.id = id; v.srcObject = stream; v.autoplay = true; v.playsinline = true;
        document.getElementById('video-grid').appendChild(v);
    }

    function logout() { localStorage.clear(); location.reload(); }

    // Auto Login
    const sU = localStorage.getItem('golongan_user'), sP = localStorage.getItem('golongan_pass');
    if(sU && sP) { document.getElementById('username').value = sU; document.getElementById('password').value = sP; handleAuth('login'); }
</script>
</body>
</html>
