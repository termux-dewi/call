<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>GitHub DB Video Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; min-width: 300px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-reg { background: #6c757d; color: white; }
        .btn-login { background: #28a745; color: white; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 20px; }
        video { width: 100%; border-radius: 10px; background: #000; transform: scaleX(-1); }
        .hidden { display: none; }
        .user-item { border-bottom: 1px solid #333; padding: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="auth-view" class="card">
        <h2>Login / Register</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <br>
        <button class="btn-login" onclick="login()">Login</button>
        <button class="btn-reg" onclick="register()">Register (Save to GitHub)</button>
    </div>

    <div id="main-view" class="hidden">
        <h3 id="welcome">Halo</h3>
        <div id="video-grid">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <h4>Daftar User (Maks 9)</h4>
        <div id="user-list">Memuat database...</div>
    </div>

<script>
    // --- KONFIGURASI GITHUB (Ganti bagian ini) ---
    const GITHUB_TOKEN = "YOUR_GITHUB_TOKEN"; 
    const REPO_OWNER = "YOUR_USERNAME";
    const REPO_NAME = "YOUR_REPO_NAME";
    const FILE_PATH = "database.json";

    let myPeer, localStream, currentUser, myPeerId;

    // --- FUNGSI GITHUB API (Read & Write) ---
    async function getDB() {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            headers: { Authorization: `token ${GITHUB_TOKEN}` }
        });
        const data = await res.json();
        const content = atob(data.content); // Decode Base64
        return { users: JSON.parse(content), sha: data.sha };
    }

    async function saveDB(newUsers, sha) {
        const content = btoa(JSON.stringify(newUsers, null, 2));
        await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            method: "PUT",
            headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: "Update database.json", content, sha })
        });
    }

    // --- AUTH LOGIC ---
    async function register() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const db = await getDB();
        
        if (db.users.find(u => u.username === user)) return alert("User sudah ada!");
        
        db.users.push({ username: user, password: pass, peerId: "" });
        await saveDB(db.users, db.sha);
        alert("Berhasil Register! Silakan Login.");
    }

    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const db = await getDB();
        
        const found = db.users.find(u => u.username === user && u.password === pass);
        if (found) {
            currentUser = user;
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('welcome').innerText = "Halo, " + user;
            startCallSystem(db);
        } else {
            alert("Login Gagal!");
        }
    }

    // --- CALL SYSTEM ---
    async function startCallSystem(db) {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;

        myPeer = new Peer();
        myPeer.on('open', async (id) => {
            myPeerId = id;
            // Update PeerId kita di GitHub agar orang lain bisa panggil
            const latestDB = await getDB();
            const index = latestDB.users.findIndex(u => u.username === currentUser);
            latestDB.users[index].peerId = id;
            await saveDB(latestDB.users, latestDB.sha);
            renderUsers(latestDB.users);
        });

        myPeer.on('call', call => {
            call.answer(localStream);
            handleIncomingStream(call);
        });
    }

    function renderUsers(users) {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        users.forEach(u => {
            if (u.username === currentUser || !u.peerId) return;
            list.innerHTML += `
                <div class="user-item">
                    <span>${u.username}</span>
                    <div>
                        <button onclick="makeCall('${u.peerId}', 'call')" style="background:green">Voice</button>
                        <button onclick="makeCall('${u.peerId}', 'vc')" style="background:blue">Video</button>
                    </div>
                </div>`;
        });
    }

    function makeCall(id, type) {
        localStream.getVideoTracks()[0].enabled = (type === 'vc');
        const call = myPeer.call(id, localStream, { metadata: { type } });
        handleIncomingStream(call);
    }

    function handleIncomingStream(call) {
        const video = document.createElement('video');
        call.on('stream', stream => {
            if (document.getElementById(call.peer)) return;
            video.id = call.peer;
            video.srcObject = stream;
            video.autoplay = true;
            if (call.metadata?.type === 'call') video.style.display = 'none';
            document.getElementById('video-grid').append(video);
        });
    }
</script>
</body>
</html>
