<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golongan App</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root { 
            --bg: #0b141a; --header: #202c33; --accent: #00a884;
            --me: #005c4b; --them: #262d31; --text: #e9edef;
        }
        
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTH */
        #auth-view { display: flex; align-items: center; justify-content: center; height: 100%; padding: 20px; }
        .auth-card { background: var(--header); padding: 30px; border-radius: 10px; width: 100%; max-width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; background: #2a3942; color: white; box-sizing: border-box; }

        /* SIDEBAR (MENU GARIS TIGA) */
        .sidebar { 
            position: fixed; left: -250px; top: 0; width: 250px; height: 100%; 
            background: #111b21; transition: 0.3s; z-index: 100; border-right: 1px solid #2a3942;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: var(--header); font-weight: bold; border-bottom: 1px solid #2a3942; }
        .menu-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .menu-item:hover { background: #2a3942; }

        /* MAIN UI */
        header { background: var(--header); padding: 15px; display: flex; align-items: center; gap: 15px; }
        .content { height: calc(100vh - 120px); display: flex; flex-direction: column; }
        
        /* CHAT AREA */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14px; }
        .me { background: var(--me); align-self: flex-end; }
        .them { background: var(--them); align-self: flex-start; }

        /* VIDEO AREA */
        #video-grid { display: flex; flex-wrap: wrap; gap: 5px; background: #000; padding: 5px; }
        video { width: 48%; border-radius: 5px; background: #222; aspect-ratio: 4/3; object-fit: cover; }

        /* LIST USER */
        .user-row { padding: 15px; border-bottom: 1px solid #2a3942; display: flex; justify-content: space-between; align-items: center; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 90; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="auth-view">
        <div class="auth-card">
            <h2 style="color: var(--accent);">GOLONGAN</h2>
            <input type="text" id="username" placeholder="Username">
            <button onclick="login()" style="width:100%; background:var(--accent); color:white; border:none; padding:12px; border-radius:5px; font-weight:bold;">MASUK / DAFTAR</button>
        </div>
    </div>

    <div id="main-view" class="hidden">
        <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header" id="user-display">User</div>
            <div class="menu-item" onclick="showSection('chat_grup')">💬 Chat Grup</div>
            <div class="menu-item" onclick="showSection('pilih_user_chat')">👤 Chat Private</div>
            <div class="menu-item" onclick="showSection('pilih_user_call')">📞 Call</div>
            <div class="menu-item" onclick="showSection('pilih_user_vc')">📹 Video Call</div>
            <div class="menu-item" onclick="logout()" style="color:#ff4b4b; margin-top:20px;">🚪 Logout</div>
        </div>

        <header>
            <div onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">☰</div>
            <div id="section-title">Chat Grup</div>
        </header>

        <div id="video-grid" class="hidden">
            <video id="localVideo" autoplay muted playsinline></video>
        </div>

        <div class="content">
            <div id="chat-section" class="hidden" style="flex:1; display:flex; flex-direction:column;">
                <div id="chat-box"></div>
                <div style="padding:10px; background:var(--header); display:flex; gap:10px;">
                    <input type="text" id="chat-input" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:5px;">➤</button>
                </div>
            </div>

            <div id="list-section" class="hidden" style="overflow-y:auto;">
                <div id="online-list"></div>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA335JEP-5VPS60PcttrNh_D0DJ7XiLu2A",
        authDomain: "golongan.firebaseapp.com",
        databaseURL: "https://golongan-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "golongan",
        storageBucket: "golongan.firebasestorage.app",
        messagingSenderId: "927321543281",
        appId: "1:927321543281:web:99a74c3e826dbe882641d0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser, myPeer, localStream, currentMode, currentTarget = "GROUP";

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    async function login() {
        currentUser = document.getElementById('username').value.trim();
        if(!currentUser) return;
        localStorage.setItem('golongan_user', currentUser);
        
        myPeer = new Peer();
        myPeer.on('open', id => {
            db.ref('users/' + currentUser).set({ peerId: id, status: 'online' });
            db.ref('users/' + currentUser).onDisconnect().remove();
            startApp();
        });
    }

    function startApp() {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        document.getElementById('user-display').innerText = currentUser;
        
        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
            localStream = s; document.getElementById('localVideo').srcObject = s;
        });

        // Listen Chat
        db.ref('messages/global').limitToLast(50).on('child_added', snap => {
            const m = snap.val();
            const isMe = m.sender === currentUser;
            document.getElementById('chat-box').innerHTML += `<div class="bubble ${isMe?'me':'them'}"><b>${m.sender}:</b><br>${m.text}</div>`;
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });

        // Listen Panggilan
        myPeer.on('call', call => {
            call.answer(localStream);
            document.getElementById('video-grid').classList.remove('hidden');
            call.on('stream', s => addRemoteVideo(s, call.peer));
        });

        showSection('chat_grup');
    }

    function showSection(mode) {
        currentMode = mode;
        toggleMenu();
        document.getElementById('chat-section').classList.add('hidden');
        document.getElementById('list-section').classList.add('hidden');
        document.getElementById('video-grid').classList.add('hidden');

        if(mode === 'chat_grup') {
            document.getElementById('section-title').innerText = "Global Chat";
            document.getElementById('chat-section').classList.remove('hidden');
            currentTarget = "GROUP";
        } else {
            const titles = {pilih_user_chat: "Pilih User Chat", pilih_user_call: "Pilih User Call", pilih_user_vc: "Pilih User VC"};
            document.getElementById('section-title').innerText = titles[mode];
            document.getElementById('list-section').classList.remove('hidden');
            loadUserList();
        }
    }

    function loadUserList() {
        db.ref('users').once('value', snap => {
            const users = snap.val();
            const list = document.getElementById('online-list');
            list.innerHTML = "";
            for(let name in users) {
                if(name === currentUser) continue;
                list.innerHTML += `
                    <div class="user-row">
                        <span>● ${name}</span>
                        <button onclick="executeAction('${name}', '${users[name].peerId}')" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:5px;">Pilih</button>
                    </div>`;
            }
        });
    }

    function executeAction(name, peerId) {
        if(currentMode === 'pilih_user_chat') {
            alert("Chat Private belum didukung di versi ini, gunakan Chat Grup.");
        } else {
            document.getElementById('video-grid').classList.remove('hidden');
            localStream.getVideoTracks()[0].enabled = (currentMode === 'pilih_user_vc');
            const call = myPeer.call(peerId, localStream);
            call.on('stream', s => addRemoteVideo(s, peerId));
        }
    }

    function addRemoteVideo(stream, id) {
        if(document.getElementById(id)) return;
        const v = document.createElement('video'); v.id = id; v.srcObject = stream; v.autoplay = true; v.playsinline = true;
        document.getElementById('video-grid').appendChild(v);
    }

    function send() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        db.ref('messages/global').push({ sender: currentUser, text: inp.value });
        inp.value = "";
    }

    function logout() { localStorage.clear(); location.reload(); }

    // Auto login
    const saved = localStorage.getItem('golongan_user');
    if(saved) { document.getElementById('username').value = saved; login(); }
</script>
</body>
                </html>
