<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Video Call (Max 9)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; padding: 10px; flex-grow: 1; }
        video { width: 100%; border-radius: 10px; background: #222; transform: scaleX(-1); object-fit: cover; aspect-ratio: 4/3; }
        .controls { background: #1e1e1e; padding: 20px; text-align: center; border-top: 1px solid #333; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .my-id { font-size: 0.8em; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="video-grid">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

    <div class="controls">
        <div class="my-id" id="display-id">Menghubungkan...</div>
        <input type="text" id="room-input" placeholder="Masukkan Nama Room (e.g. mabar-123)">
        <button id="join-btn">Masuk ke Room</button>
    </div>

<script>
    let localStream;
    const peers = {}; // Menyimpan semua koneksi aktif
    const videoGrid = document.getElementById('video-grid');
    const myVideo = document.getElementById('localVideo');
    
    // Inisialisasi PeerJS (Menggunakan server gratis PeerJS)
    const peer = new Peer(undefined, {
        host: '/',
        port: 443,
        secure: true
    });

    // Ambil akses Kamera & Mikrofon
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        localStream = stream;
        myVideo.srcObject = stream;
    });

    peer.on('open', id => {
        document.getElementById('display-id').innerText = "ID Anda: " + id;
    });

    // LOGIKA SAAT ADA ORANG LAIN MEMANGGIL KITA (Incoming Call)
    peer.on('call', call => {
        call.answer(localStream); // Balas dengan stream kita
        const video = document.createElement('video');
        call.on('stream', userVideoStream => {
            addVideoStream(video, userVideoStream, call.peer);
        });
    });

    // JOIN ROOM LOGIC
    document.getElementById('join-btn').addEventListener('click', () => {
        const roomId = document.getElementById('room-input').value;
        if (!roomId) return alert("Isi nama room!");

        // Karena PeerJS bersifat P2P murni, kita butuh cara untuk tahu siapa saja yang ada di room.
        // Tips: Untuk aplikasi produksi, gunakan Firebase/Supabase untuk list User ID di dalam room.
        // Untuk demo ini, kita asumsikan Anda membagikan ID Peer Anda ke teman.
        
        const peerToCall = prompt("Masukkan ID Teman yang sudah di dalam Room:");
        if (peerToCall) {
            connectToNewUser(peerToCall, localStream);
        }
    });

    function connectToNewUser(userId, stream) {
        // Cek limit maksimal 9 orang
        if (Object.keys(peers).length >= 8) { // 8 teman + 1 diri sendiri = 9
            alert("Room penuh!");
            return;
        }

        const call = peer.call(userId, stream);
        const video = document.createElement('video');
        call.on('stream', userVideoStream => {
            addVideoStream(video, userVideoStream, userId);
        });
        call.on('close', () => {
            video.remove();
        });

        peers[userId] = call;
    }

    function addVideoStream(video, stream, userId) {
        if (document.getElementById(userId)) return; // Jangan duplikat
        video.id = userId;
        video.srcObject = stream;
        video.autoplay = true;
        video.playsinline = true;
        videoGrid.append(video);
    }
</script>
</body>
</html>
